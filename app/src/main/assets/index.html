<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Copilot Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            background: #0078d4;
            color: #fff;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }

        #status {
            font-size: 11px;
            color: #605e5c;
            padding: 4px 16px;
            background: #faf9f8;
            border-bottom: 1px solid #edebe9;
            flex-shrink: 0;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #input-row {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid #edebe9;
            flex-shrink: 0;
            background: #fff;
        }

        #input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #8a8886;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        #input:focus { border-color: #0078d4; }
        #input:disabled { background: #f3f2f1; }

        #send {
            padding: 8px 16px;
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        #send:disabled { background: #c8c6c4; cursor: default; }
    </style>
</head>
<body>
    <div id="header">Copilot</div>
    <div id="status">Waiting for authentication...</div>
    <div id="messages"></div>
    <div id="input-row">
        <input id="input" type="text" placeholder="Type a message..." autocomplete="off" disabled />
        <button id="send" disabled>Send</button>
    </div>

    <!-- Built by: cd webchat && npm install && npm run build -->
    <script src="chat.bundle.js"></script>
</body>
</html>
